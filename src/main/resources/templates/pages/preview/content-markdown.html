<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}"
      layout:fragment="content">
<script>
</script>
<main class="page-legacy-post">
    <section class="container mt-5">
        <div class="row">
            <div class="col-lg-8">
                <article>
                    <section class="mb-5">
                        <div th:utext="${content.HTMLbyMarkdown}"></div>
                    </section> 
                </article>
                <section th:replace="~{fragments/section::commentSection}"></section>
            </div>
            <div class="col-lg-4">
                <div class="card mb-4">
                    <div class="card-header">프롬프트 다시 입력</div>
                    <div class="card-body">
                        <form th:action="@{/content/prompt}" method="post" id="frm">
                            <div class="input-group">
                                <input class="form-control" name="promptText" type="text" placeholder="write post title" aria-label="write post title" aria-describedby="button-search">
                                <button class="btn btn-primary" id="button-search" type="submit">Go!</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-header">Categories</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-sm-6">
                                <ul class="list-unstyled mb-0">
                                    <li><a href="#!">Web Design</a></li>
                                    <li><a href="#!">HTML</a></li>
                                    <li><a href="#!">Freebies</a></li>
                                </ul>
                            </div>
                            <div class="col-sm-6">
                                <ul class="list-unstyled mb-0">
                                    <li><a href="#!">JavaScript</a></li>
                                    <li><a href="#!">CSS</a></li>
                                    <li><a href="#!">Tutorials</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-header">카테고리 설정 안내</div>
                    <div class="card-body">카테고리는 TistoryAPI에서 별도의 category-id를 받아야 설정 할 수 있습니다.</div>
                </div>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js?v=3}"></script>
</html>
