<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}"
      layout:fragment="content">
<link rel="stylesheet" th:href="@{/css/content-markdown.css}">
<main class="page-legacy-post">
    <section class="container mt-5">
        <div class="row prompt-input-section">
            <div class="col-lg-8">
                <form th:action="@{/content/prompt/markdown}" method="post" id="frm">
                    <input class="form-control" name="promptText" type="text" placeholder="Input prompt" aria-label="Input prompt" th:value="${originPrompt}"></input>
                </form>
            </div>
            <div class="col-lg-4">
                <div class="prompt-buttons">
                    <button class="btn btn-outline-secondary" type="button" onclick="handleRegenerate()">Regenerate</button>
                    <button class="btn btn-outline-secondary" type="button" onclick="handleAiConfirm()">AiConfirm</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <article id="modeViewer" class="content-area active">
                    <section class="mb-5">
                        <div id="view">loading...</div>
                    </section>
                </article>

                <article id="modeEditer" class="content-area">
                    <section class="mb-5">
                        <textarea id="markdownEditor" oninput="onEdit(this.value)" th:text="${content.rawMarkdown}"></textarea>
                    </section>
                </article>

                <section th:replace="~{fragments/section::commentSection}"></section>
            </div>

            <div class="col-lg-4">
                <div class="sidebar-controls">
                    <div class="mode-switch">
                        <span id="labelViewer" class="mode-label active">modeViewer</span>
                        <label class="switch">
                            <input type="checkbox" id="modeSwitch" onchange="toggleMode()">
                            <span class="slider"></span>
                        </label>
                        <span id="labelEdit" class="mode-label">modeEditer</span>
                    </div>

                    <div class="upload-section">
                        <button class="btn btn-upload w-100" id="uploadBtn">Upload to</button>
                    </div>

                    <div>
                        <button class="btn btn-guide w-100" onclick="handleGuide()">Guide</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- <script type="module"> import { Octokit } from "https://esm.sh/@octokit/core"; </script>  https://github.com/octokit/core.js#readme 공식문서 제안 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<script th:inline="javascript">

    const viewEL = document.getElementById("view");
    let contentText = /*[[${content.rawMarkdown}]]*/ '';

    function render(contentText) {
        const html = marked.parse(contentText);
        viewEL.innerHTML = DOMPurify.sanitize(html);
    }
    
    render(contentText);

    function onEdit(v) {
        contentText = v;
    }
    
    function toggleMode() {
        render(contentText);

        const modeSwitch = document.getElementById('modeSwitch');
        const modeViewer = document.getElementById('modeViewer');
        const modeEditer = document.getElementById('modeEditer');
        const labelViewer = document.getElementById('labelViewer');
        const labelEdit = document.getElementById('labelEdit');

        if (modeSwitch.checked) {
            modeViewer.classList.remove('active');
            modeEditer.classList.add('active');
            labelViewer.classList.remove('active');
            labelEdit.classList.add('active');
        } else {
            modeEditer.classList.remove('active');
            modeViewer.classList.add('active');
            labelEdit.classList.remove('active');
            labelViewer.classList.add('active');
        }
    }
    function handleRegenerate() {
        console.log('Regenerate clicked');
    }

    function handleAiConfirm() {
        console.log('AiConfirm clicked');
    }


    function handleGuide() {
        console.log('Guide clicked');
    }

</script>
<script type="module">
    // github 로그인 안되어있으면 모달창 만들어서 Token 및 repo 정보 받기
    import { Octokit } from "https://cdn.skypack.dev/@octokit/core"; // https://github.com/octokit/core.js#readme 공식문서 제안 

    const editerEL = document.getElementById("markdownEditor");

    let markdownText = editerEL.value;

    // https://docs.github.com/ko/rest/repos/contents?utm_source=chatgpt.com&apiVersion=2022-11-28#create-or-update-file-contents
    const octokit = new Octokit({
        auth: 'your github token(classic)'
    })

    async function createRepo() {
        await octokit.request("POST /user/repos", {
            name: "createRepo",
            private: false
        });
    }

    async function createFile() {
        await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
            owner: 'github id : The account owner of the repository. The name is not case sensitive.',
            repo: 'repository name : The name of the repository without the .git extension. The name is not case sensitive.',
            path: 'path + filename : if write as src/test.md, you can see at /src/test.md',
            message: 'a new commit message',
            committer: {
                name: 'user.name',
                email: 'user.email'
            },
            content: btoa(unescape(encodeURIComponent(markdownText))), //ex : 'bXkgdXBkYXRlZCBmaWxlIGNvbnRlbnRz',
            headers: {
                'X-GitHub-Api-Version': '2022-11-28'
            }
        });
    }

    async function handleUpload()  {

        try {
            const res = await createFile();
            console.error(res);
        } catch (error) {
            if (error.status === 404) {
                await createRepo();
                await createFile();
            } else {
                console.error(error);
            }
        }

    }

    document
        .getElementById("uploadBtn")
        .addEventListener("click", handleUpload);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js?v=3}"></script>
</html>
